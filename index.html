<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Saber: Neon Blade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <div id="ui-layer">
            <!-- HUD -->
            <div id="hud" class="hidden">
                <div class="stat-group">
                    <div class="label">PLAYER <span id="player-hp-text">100/100</span></div>
                    <div class="bar-container">
                        <div id="player-hp-bar" class="bar"></div>
                    </div>
                </div>
                <div id="stage-info">STAGE 1</div>
                <div class="stat-group">
                    <div class="label" style="text-align: right;">ENEMY <span id="enemy-hp-text">100/100</span></div>
                    <div class="bar-container">
                        <div id="enemy-hp-bar" class="bar" style="float: right;"></div>
                    </div>
                </div>
            </div>

            <!-- Menus -->
            <div id="main-menu" class="menu-screen active">
                <h1 class="glitch-text">NEON SABER</h1>
                <p>STICKMAN WARRIOR</p>
                <button id="start-btn" class="glow-btn">BATTLE START</button>
            </div>

            <div id="reward-menu" class="menu-screen hidden">
                <h2>STAGE CLEAR!</h2>
                <div id="reward-options"></div>
            </div>

            <div id="game-over" class="menu-screen hidden">
                <h2 class="danger">DEFEATED</h2>
                <button id="retry-btn" class="glow-btn">TRY AGAIN</button>
            </div>

            <!-- RPG-Style Mobile Controls -->
            <div id="mobile-controls">
                <!-- Move Joystick -->
                <div class="joystick-area" id="joystick-area">
                    <div id="joystick-knob"></div>
                </div>

                <!-- Action Cluster -->
                <div class="action-cluster">
                    <button id="attack-btn" class="action-btn">ATK</button>
                    <button id="jump-btn" class="action-btn">JUMP</button>
                    <button id="skill-btn" class="action-btn special">SKILL</button>
                </div>
            </div>
        </div>
    </div>

    <script src="src/utilities.js"></script>
    <script src="src/input.js"></script>
    <script src="src/entities.js"></script>
    <script src="src/game.js"></script>
</body>
</html>
